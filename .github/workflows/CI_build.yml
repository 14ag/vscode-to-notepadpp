name: CI_build

on: [push, pull_request]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_configuration: [Release, Debug]
        build_platform: [x64, Win32, ARM64]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: generate cmake
      run: |
           cmake -G "Visual Studio 17 2022" -A ${{ matrix.build_platform }} -T "v143" -B _build

    - name: build cmake
      run: |
           cmake --build _build --config ${{ matrix.build_configuration }} --target VSCodeKeymapNpp

    - uses: olegtarasov/get-tag@v2.1.4
      id: tagName
      
    - name: zip artifacts for ${{ matrix.build_platform }}
      if: matrix.build_configuration == 'Release'
      run: 7z a VSCodeKeymapNpp_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip .\_build\${{ matrix.build_configuration }}\VSCodeKeymapNpp.dll

    - name: Archive artifacts for ${{ matrix.build_platform }}
      if: matrix.build_configuration == 'Release'
      uses: actions/upload-artifact@v7
      with:
          name: VSCodeKeymapNpp_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip
          path: VSCodeKeymapNpp_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip

    - name: Create release on tagging
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
          files: VSCodeKeymapNpp_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip